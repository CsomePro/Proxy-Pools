name: ci

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t proxy-pool:test .

      - name: Start container
        run: |
          docker run -d --name proxy-pool-test -p 19080:9080 proxy-pool:test
          sleep 5

      - name: Check API status
        run: curl --fail --silent http://127.0.0.1:19080/api/status

      - name: Stop container
        if: always()
        run: docker rm -f proxy-pool-test
